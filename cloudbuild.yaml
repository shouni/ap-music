substitutions:
  _ENV_PREFIX: 'develop'
  _REGION: 'asia-northeast1'
  _IMAGE_BASE: 'asia-northeast1-docker.pkg.dev'
  _REPO_PATH: 'ap-repo/ap-music'
  _SERVICE_NAME: 'ap-music'
  _TAG: '${_ENV_PREFIX}-${SHORT_SHA}'
  _CACHE_TAG: '${_ENV_PREFIX}-latest'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Pull Cache Image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull ${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_CACHE_TAG} || exit 0

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build with BuildKit'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_TAG}'
      - '-t'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_CACHE_TAG}'
      - '--cache-from'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_CACHE_TAG}'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Image to Registry'
    args:
      - 'push'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_TAG}'

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy to Cloud Run'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'GCP_PROJECT_ID=${PROJECT_ID},
        GCP_LOCATION_ID=${_REGION},
        GEMINI_MODEL=gemini-3.5-flash,
        LYRIA_MODEL=lyria-3-pro-preview,
        IMAGE_MODEL=gemini-3.1-pro-image'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Cache Image'
    args:
      - 'push'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_CACHE_TAG}'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
