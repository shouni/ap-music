substitutions:
  _IMAGE_BASE: 'asia-northeast1-docker.pkg.dev'
  _REPO_PATH: 'ap-repo/ap_music'
  _ENV_PREFIX: 'develop'
  _CACHE_TAG: 'develop-latest'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull ${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_CACHE_TAG} || exit 0

  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_ENV_PREFIX}-${SHORT_SHA}'
      - '-t'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_CACHE_TAG}'
      - '--cache-from'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_CACHE_TAG}'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '.'

images:
  - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_ENV_PREFIX}-${SHORT_SHA}'
  - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_CACHE_TAG}'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

logRetentionDays: '7'