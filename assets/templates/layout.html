<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#76bc21">
    <title>{{.Title}} - AP Music</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --zunda-green: #76bc21;
            --zunda-dark: #64a01c;
        }
        body {
            background-color: #fcfdfb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .main-content { flex: 1; }

        .navbar { background-color: var(--zunda-green); }
        .nav-link { color: rgba(255,255,255,0.85) !important; transition: all 0.2s; }
        .nav-link:hover { color: white !important; transform: translateY(-1px); }

        .btn-primary { background-color: var(--zunda-green); border-color: var(--zunda-green); }
        .btn-primary:hover { background-color: var(--zunda-dark); border-color: var(--zunda-dark); }

        .nav-link.active {
            color: white !important;
            font-weight: bold;
            border-bottom: 2px solid white;
        }

        footer hr { border-top: 1px solid #dee2e6; width: 50%; margin: 2rem auto; }

        .navbar-toggler { border-color: rgba(255,255,255,0.5) !important; }
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='rgba(255, 255, 255, 1)' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E") !important;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4 shadow-sm navbar-dark">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="/">
            <i class="bi bi-music-note-beamed me-2"></i>AP Music
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/web/generate-from-recipe">Generate</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/web/history">History</a>
                </li>
            </ul>
            <span class="navbar-text text-white-50 small">
                2026 Edition | <i class="bi bi-lightning-charge-fill"></i> Gemini 3 Flash
            </span>
        </div>
    </div>
</nav>

<div class="container main-content">
    {{template "content" .}}
</div>

<footer class="container text-center mt-5 mb-4 text-muted small">
    <hr class="mb-4 opacity-25">
    <div class="mb-2">
        <i class="bi bi-github me-2"></i>
        &copy; 2026 <strong>AP Music Project</strong>
    </div>
    <div class="fst-italic">
        <i class="bi bi-quote"></i> Making Music space between 0 and 1.
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const currentPath = window.location.pathname;
        document.querySelectorAll('.navbar-nav .nav-link').forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPath || (href !== '/' && currentPath.startsWith(href))) {
                link.classList.add('active');
            }
        });
    });
</script>
</body>
</html>
