{{define "content"}}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-clock-history me-2"></i>楽曲生成履歴</h2>
        <a href="/" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>新規作成
        </a>
    </div>

    <div class="list-group shadow-sm mt-3">
        {{range .Data}}
        <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3 position-relative">
            <div class="flex-grow-1">
                <a href="/web/history/{{.JobID}}" class="text-decoration-none text-dark d-block mb-1 stretched-link">
                    <h5 class="mb-0 fw-bold">{{.Title}}</h5>
                </a>
                <div class="text-muted small">
                    {{if .CreatedAt}}
                    <i class="bi bi-calendar3 me-1"></i>{{.CreatedAt}}
                    {{end}}
                </div>
            </div>

            <div class="ms-3 d-flex align-items-center gap-2 position-relative z-3">
                <audio id="audio-{{.JobID}}" src="/web/audio/{{.JobID}}" preload="none"></audio>

                <button class="btn btn-outline-primary btn-lg rounded-circle shadow-sm audio-toggle-btn"
                        id="btn-{{.JobID}}"
                        data-job-id="{{.JobID}}"
                        onclick="toggleAudio(this.dataset.jobId, event)"
                        style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                    <i class="bi bi-play-fill" id="icon-{{.JobID}}"></i>
                </button>

                <a href="/web/history/{{.JobID}}" class="btn btn-light btn-sm border">
                    詳細 <i class="bi bi-chevron-right"></i>
                </a>

                <!-- 追加: 削除ボタン -->
                <button class="btn btn-outline-danger btn-sm"
                        onclick="deleteHistory('{{.JobID}}', event)"
                        title="削除">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>
        {{else}}
        <div class="alert alert-light border text-center py-5">
            <i class="bi bi-music-note-list display-4 text-muted mb-3 d-block"></i>
            <p class="mb-0">履歴がまだありません。新しい楽曲を創造しましょう！</p>
        </div>
        {{end}}
    </div>
</div>

<!-- ページ全体で使えるようにCSRFトークンを埋め込み -->
<input type="hidden" id="csrf_token" value="{{.CSRFToken}}">

<script>
    /**
     * 指定されたジョブIDの履歴を削除します。
     */
    async function deleteHistory(jobID, event) {
        if (event) event.stopPropagation();

        if (!confirm('この楽曲履歴を削除するのだ？（元には戻せないのだ！）')) {
            return;
        }

        // 埋め込まれたCSRFトークンを取得
        const csrfToken = document.getElementById('csrf_token').value;

        try {
            const response = await fetch(`/web/history/${jobID}`, {
                method: 'DELETE',
                headers: {
                    'X-CSRF-Token': csrfToken
                }
            });

            if (response.ok) {
                const item = document.getElementById('btn-' + jobID)?.closest('.list-group-item');
                if (item) {
                    item.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                    item.style.opacity = '0';
                    item.style.transform = 'translateX(20px)';

                    setTimeout(() => {
                        item.remove();
                        if (document.querySelectorAll('.list-group-item').length === 0) {
                            window.location.reload();
                        }
                    }, 300);
                }
            } else {
                const errorText = await response.text();
                alert('削除に失敗したのだ: ' + errorText);
            }
        } catch (error) {
            console.error('Delete Error:', error);
            alert('通信エラーが発生したのだ。');
        }
    }

    /**
     * オーディオの再生・一時停止を切り替え
     */
    function toggleAudio(jobID, event) {
        if (event) event.stopPropagation();

        const audio = document.getElementById('audio-' + jobID);
        const icon = document.getElementById('icon-' + jobID);

        document.querySelectorAll('audio').forEach(el => {
            if (el.id !== 'audio-' + jobID) {
                el.pause();
                const otherID = el.id.replace('audio-', '');
                const otherIcon = document.getElementById('icon-' + otherID);
                if (otherIcon) {
                    otherIcon.className = 'bi bi-play-fill';
                }
            }
        });

        if (audio.paused) {
            audio.play().then(() => {
                icon.className = 'bi bi-pause-fill';
            }).catch(err => {
                console.error("再生に失敗しました:", err);
                alert("楽曲ファイルを読み込めませんでした。");
            });
        } else {
            audio.pause();
            icon.className = 'bi bi-play-fill';
        }

        audio.onended = () => {
            icon.className = 'bi bi-play-fill';
        };
    }
</script>
{{end}}
