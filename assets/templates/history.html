{{define "content"}}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-clock-history me-2"></i>楽曲生成履歴</h2>
        <a href="/" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>新規作成
        </a>
    </div>

    <div class="list-group shadow-sm mt-3">
        {{range .Data}}
        <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
            <div class="flex-grow-1">
                <a href="/web/history/{{.JobID}}" class="text-decoration-none text-dark d-block mb-1">
                    <h5 class="mb-0 fw-bold">{{.Title}}</h5>
                </a>
                <div class="text-muted small">
                    {{if .CreatedAt}}
                    <i class="bi bi-calendar3 me-1"></i>{{.CreatedAt}}
                    {{end}}
                </div>
            </div>

            <div class="ms-3 d-flex align-items-center gap-2">
                <audio id="audio-{{.JobID}}" src="/web/audio/{{.JobID}}" preload="none"></audio>

                <button class="btn btn-outline-primary btn-lg rounded-circle shadow-sm audio-toggle-btn"
                        id="btn-{{.JobID}}"
                        data-job-id="{{.JobID}}"
                        onclick="toggleAudio(this.dataset.jobId)"
                        style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                    <i class="bi bi-play-fill" id="icon-{{.JobID}}"></i>
                </button>

                <a href="/web/history/{{.JobID}}" class="btn btn-light btn-sm border">
                    詳細 <i class="bi bi-chevron-right"></i>
                </a>
            </div>
        </div>
        {{else}}
        <div class="alert alert-light border text-center py-5">
            <i class="bi bi-music-note-list display-4 text-muted mb-3 d-block"></i>
            <p class="mb-0">履歴がまだありません。新しい楽曲を創造しましょう！</p>
        </div>
        {{end}}
    </div>
</div>

<script>
    /**
     * オーディオの再生・一時停止を切り替え、アイコンを更新します。
     */
    function toggleAudio(jobID) {
        const audio = document.getElementById('audio-' + jobID);
        const icon = document.getElementById('icon-' + jobID);
        const btn = document.getElementById('btn-' + jobID);

        // 他の全てのオーディオを停止（同時再生を防止）
        document.querySelectorAll('audio').forEach(el => {
            if (el.id !== 'audio-' + jobID) {
                el.pause();
                const otherID = el.id.replace('audio-', '');
                const otherIcon = document.getElementById('icon-' + otherID);
                if (otherIcon) {
                    otherIcon.className = 'bi bi-play-fill';
                }
            }
        });

        if (audio.paused) {
            audio.play().then(() => {
                icon.className = 'bi bi-pause-fill';
            }).catch(err => {
                console.error("再生に失敗しました:", err);
                alert("楽曲ファイルを読み込めませんでした。");
            });
        } else {
            audio.pause();
            icon.className = 'bi bi-play-fill';
        }

        // 再生終了時にアイコンを戻す
        audio.onended = () => {
            icon.className = 'bi bi-play-fill';
        };
    }
</script>
{{end}}
