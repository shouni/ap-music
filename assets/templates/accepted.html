{{define "content"}}
<div class="row justify-content-center py-5">
    <div class="col-md-8 text-center">
        <div class="card shadow border-0 overflow-hidden" style="border-radius: 20px;">
            <div class="progress rounded-0" style="height: 6px;">
                <div class="progress-bar progress-bar-striped progress-bar-animated"
                     role="progressbar" style="width: 100%; background-color: var(--zunda-green);"></div>
            </div>

            <div class="card-body py-5 px-4">
                <div class="mb-4">
                    <div class="display-1 text-success mb-3">
                        <i class="bi bi-music-note-beamed" style="color: var(--zunda-green);"></i>
                    </div>
                </div>

                <h2 class="fw-bold mb-3" style="color: var(--zunda-dark);">音楽生成を開始しました</h2>

                <p class="fs-5 text-muted mb-4">
                    現在、AIが楽曲レシピの設計とLyriaによる音楽生成を行っています。<br>
                    高品質な楽曲を調律中ですので、完了までしばらくお待ちください。
                </p>

                <div class="bg-light p-4 rounded-4 mb-5 text-start border">
                    <div class="d-flex align-items-center mb-2">
                        <i class="bi bi-vinyl me-2 text-primary fs-4"></i>
                        <span class="fw-bold text-secondary small">解析対象 / テーマ:</span>
                    </div>
                    <code class="text-break p-2 d-block bg-white rounded border font-monospace" style="color: #495057;">
                        {{if .Data.RequestURL}}{{.Data.RequestURL}}{{else}}{{.Data.InputText}}{{end}}
                    </code>
                </div>

                <hr class="my-4 opacity-25">

                <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                    <a href="/" class="btn btn-primary btn-lg px-5 rounded-pill fw-bold shadow">
                        <i class="bi bi-house-door me-2"></i>ホームへ戻る
                    </a>
                </div>
            </div>
        </div>

        <p class="mt-4 text-secondary small">
            <i class="bi bi-cpu me-1"></i> System Status: Synthesizing via Lyria 3 and Cloud Tasks.
        </p>
    </div>
</div>

<style>
    /* ずんだ色（メインのアクションカラー）の設定 */
    .btn-primary {
        background-color: var(--zunda-green) !important;
        border: none !important;
        transition: 0.2s;
        box-shadow: 0 4px 15px rgba(111, 190, 68, 0.3) !important;
    }
    .btn-primary:hover {
        background-color: var(--zunda-dark) !important;
        transform: translateY(-2px);
    }
    /* 音楽に関連する要素のアクセント */
    .bi-vinyl {
        color: var(--zunda-green) !important;
    }
</style>
{{end}}
